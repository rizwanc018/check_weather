<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Not Found – SkyPulse</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Open+Sans:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link href="{{ url_for('static', filename='styles/style.css') }}" rel="stylesheet" />
    <style>

        .page {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Error card */
        .error-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            margin-bottom: 0.75rem;
        }

        /* Top strip with error colour */
        .error-card-top {
            background: linear-gradient(135deg, #1e3a56 0%, #162d45 100%);
            border-bottom: 1px solid rgba(239, 68, 68, 0.2);
            padding: 2rem 1.8rem;
            text-align: center;
            position: relative;
        }

        /* Animated cloud with X */
        .error-icon-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 1.2rem;
        }

        .cloud-emoji {
            font-size: 5rem;
            display: block;
            animation: float 4s ease-in-out infinite;
            filter: grayscale(0.3) opacity(0.85);
        }


        .x-badge {
            position: absolute;
            bottom: 4px;
            right: -4px;
            width: 26px;
            height: 26px;
            background: var(--danger);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 900;
            color: #fff;
            border: 2px solid var(--bg-card);
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.5);
            animation: pulse-badge 2.5s ease-in-out infinite;
        }


        .error-code {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--danger);
            margin-bottom: 0.5rem;
        }

        .error-title {
            font-family: 'Lato', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
        }

        .error-subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 300;
            line-height: 1.55;
        }

        /* Searched city display */
        .searched-city {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--danger-soft);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 6px;
            padding: 0.35rem 0.85rem;
            margin-top: 1rem;
            font-size: 0.82rem;
            color: #fca5a5;
        }

        .searched-city span {
            opacity: 0.7;
        }
        .search-bar {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .search-bar form {
            display: flex;
            gap: 0.5rem;
        }

        .search-wrap {
            position: relative;
            flex: 1;
        }

        .search-wrap .s-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.85rem;
            pointer-events: none;
            opacity: 0.35;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.7rem;
            background: var(--bg-card2);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font-family: 'Open Sans', sans-serif;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]::placeholder {
            color: var(--text-dim);
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(247, 99, 12, 0.12);
        }

        button[type="submit"] {
            padding: 0.7rem 1.1rem;
            background: var(--accent);
            border: none;
            border-radius: 7px;
            color: #fff;
            font-family: 'Lato', sans-serif;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s, transform 0.15s;
            box-shadow: 0 3px 12px rgba(247, 99, 12, 0.3);
        }

        button[type="submit"]:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <div class="page">

        <div class="error-card">
            <div class="error-card-top">
                <div class="error-icon-wrap">
                    <span class="cloud-emoji">🌫️</span>
                    <div class="x-badge">✕</div>
                </div>
                <div class="error-code">404 – Location Not Found</div>
                <div class="error-title">We can't find that city</div>
                <div class="error-subtitle">
                    The location you searched for doesn't exist<br>in our weather database.
                </div>
                <div class="searched-city">
                    <span>You searched for:</span>
                    <strong>{{ city }}</strong>
                </div>
            </div>
        </div>

        <div class="search-bar">
            <form action="/weather">
                <div class="search-wrap">
                    <input type="text" name="city" id="city" placeholder="Try a different city…" autocomplete="off"
                        autofocus />
                </div>
                <button type="submit">Search</button>
            </form>
        </div>

    </div>
</body>

</html>
