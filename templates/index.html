<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyPulse Weather</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Open+Sans:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link href="{{ url_for('static', filename='styles/style.css') }}" rel="stylesheet" />
    <link href="{{ url_for('static', filename='styles/index.css') }}" rel="stylesheet" />

</head>

<body>
    <div class="container">

        <div class="card">
            <div class="card-label">Search Location</div>
            <form action="/weather">
                <div class="input-group">
                    <input type="text" name="city" id="city" placeholder="Enter city name…" autocomplete="off" />
                </div>
                <button type="submit">Get Weather</button>
            </form>
        </div>
    </div>
</body>

</html>
